use_default_settings: true

server:
  bind_address: "127.0.0.1"
  port: 8080
  secret_key: "firecrawl-basic-local-searxng"
  limiter: false
  image_proxy: false

search:
  formats:
    - html
    - json

outgoing:
  request_timeout: 3.0
  max_request_timeout: 5.0

engines:
  - name: google images
    disabled: true
  - name: pinterest
    disabled: true
  - name: pexels
    disabled: true
